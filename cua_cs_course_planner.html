
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,400;0,600;1,400&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --navy:#042C53;--blue:#185FA5;--blue-light:#E6F1FB;--blue-mid:#378ADD;
    --green:#3B6D11;--green-light:#EAF3DE;--green-mid:#639922;
    --amber:#854F0B;--amber-light:#FAEEDA;--amber-mid:#BA7517;
    --red:#A32D2D;--red-light:#FCEBEB;--red-mid:#E24B4A;
    --gray:#5F5E5A;--gray-light:#F1EFE8;--gray-mid:#888780;
    --teal:#0F6E56;--teal-light:#E1F5EE;--teal-mid:#1D9E75;
  }
  body{font-family:'DM Mono',monospace;background:transparent;padding:0}
  .app{padding:1.5rem 1rem}
  .header{margin-bottom:1.5rem}
  .header h1{font-family:'Fraunces',serif;font-size:22px;font-weight:600;color:var(--color-text-primary);margin-bottom:4px}
  .header p{font-size:12px;color:var(--color-text-secondary)}
  .semester-tabs{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:1.5rem}
  .tab{font-family:'DM Mono',monospace;font-size:11px;padding:5px 10px;border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);background:var(--color-background-primary);color:var(--color-text-secondary);cursor:pointer;transition:all .15s}
  .tab:hover{background:var(--color-background-secondary)}
  .tab.active{background:var(--navy);color:#E6F1FB;border-color:var(--navy)}
  .semester-label{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:.05em;text-transform:uppercase;margin-bottom:.75rem}
  .course-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:10px;margin-bottom:1.5rem}
  .course-card{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg);padding:12px;cursor:pointer;transition:all .18s;background:var(--color-background-primary);position:relative;min-height:90px;display:flex;flex-direction:column;justify-content:space-between}
  .course-card:hover{border-color:var(--color-border-primary);transform:translateY(-1px)}
  .course-card.passed{background:var(--green-light);border-color:#C0DD97}
  .course-card.selected{border:2px solid var(--blue-mid);background:var(--blue-light)}
  .course-card.ineligible{opacity:.55}
  .course-card.checking{border:2px solid var(--amber-mid);background:var(--amber-light)}
  .card-code{font-size:11px;font-weight:500;color:var(--color-text-secondary);margin-bottom:4px}
  .card-name{font-size:12px;color:var(--color-text-primary);line-height:1.4;flex:1}
  .card-credits{font-size:10px;color:var(--color-text-tertiary);margin-top:6px}
  .card-status{position:absolute;top:8px;right:8px;width:8px;height:8px;border-radius:50%}
  .status-passed{background:var(--green-mid)}
  .status-open{background:var(--gray-mid)}
  .status-locked{background:var(--red-mid)}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;z-index:100}
  .modal{background:var(--color-background-primary);border-radius:var(--border-radius-lg);border:0.5px solid var(--color-border-secondary);padding:1.5rem;width:min(360px,90vw);max-height:80vh;overflow-y:auto}
  .modal h2{font-family:'Fraunces',serif;font-size:18px;font-weight:600;color:var(--color-text-primary);margin-bottom:4px}
  .modal .subtitle{font-size:12px;color:var(--color-text-secondary);margin-bottom:1rem}
  .prereq-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary)}
  .prereq-row:last-child{border-bottom:none}
  .prereq-info{font-size:12px}
  .prereq-code{font-weight:500;color:var(--color-text-primary)}
  .prereq-name{color:var(--color-text-secondary);font-size:11px}
  .btn-yes{font-family:'DM Mono',monospace;font-size:11px;padding:4px 10px;border-radius:var(--border-radius-md);border:0.5px solid #C0DD97;background:var(--green-light);color:var(--green);cursor:pointer}
  .btn-no{font-family:'DM Mono',monospace;font-size:11px;padding:4px 10px;border-radius:var(--border-radius-md);border:0.5px solid #F7C1C1;background:var(--red-light);color:var(--red);cursor:pointer}
  .btn-passed-badge{font-size:10px;padding:3px 8px;border-radius:var(--border-radius-md);background:var(--green-light);color:var(--green);border:0.5px solid #C0DD97}
  .modal-actions{display:flex;gap:8px;margin-top:1rem}
  .btn-primary{font-family:'DM Mono',monospace;font-size:12px;padding:7px 16px;border-radius:var(--border-radius-md);border:none;background:var(--navy);color:#E6F1FB;cursor:pointer;flex:1}
  .btn-secondary{font-family:'DM Mono',monospace;font-size:12px;padding:7px 16px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:var(--color-background-primary);color:var(--color-text-primary);cursor:pointer}
  .result-banner{padding:10px 14px;border-radius:var(--border-radius-md);font-size:12px;margin-bottom:1rem}
  .result-eligible{background:var(--green-light);color:var(--green);border:0.5px solid #C0DD97}
  .result-ineligible{background:var(--red-light);color:var(--red);border:0.5px solid #F7C1C1}
  .legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:1.25rem}
  .legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
  .legend-dot{width:8px;height:8px;border-radius:50%}
  .grad-check{margin-top:1rem;padding:12px 14px;border-radius:var(--border-radius-md);font-size:12px;border:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
  .grad-check h3{font-size:13px;font-weight:500;color:var(--color-text-primary);margin-bottom:6px}
  .progress-bar{height:6px;background:var(--color-background-secondary);border-radius:3px;border:0.5px solid var(--color-border-tertiary);overflow:hidden;margin-bottom:4px}
  .progress-fill{height:100%;background:var(--green-mid);border-radius:3px;transition:width .4s}
  .progress-label{font-size:11px;color:var(--color-text-secondary)}
</style>

<h2 class="sr-only">CUA Computer Science course planner — select a semester tab, then click any course card to check prerequisites.</h2>

<div class="app">
  <div class="header">
    <h1>CS Course Planner</h1>
    <p>Select a semester, then click a course to check prerequisites</p>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:var(--green-mid)"></div>passed</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--blue-mid)"></div>selected</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--gray-mid)"></div>open</div>
    <div class="legend-item"><div class="legend-dot" style="background:var(--red-mid)"></div>prereqs unmet</div>
  </div>

  <div class="semester-tabs" id="tabs"></div>
  <div class="semester-label" id="sem-label"></div>
  <div class="course-grid" id="grid"></div>

  <div class="grad-check">
    <h3>Graduation progress</h3>
    <div class="progress-bar"><div class="progress-fill" id="prog-fill" style="width:0%"></div></div>
    <div class="progress-label" id="prog-label">0 of 0 courses passed</div>
  </div>
</div>

<div class="modal-bg" id="modal-bg" style="display:none">
  <div class="modal" id="modal"></div>
</div>

<script>
const COURSES = [
  {code:"MATH 121",name:"Calculus I",credits:4,semester:"Year 1 Fall",prerequisites:[],isPassed:false},
  {code:"CSC 120",name:"Intro to Computational Thinking",credits:3,semester:"Year 1 Fall",prerequisites:[],isPassed:false},
  {code:"CSC 123",name:"Intro to Computer Programming",credits:3,semester:"Year 1 Fall",prerequisites:[],isPassed:false},
  {code:"PHIL 201",name:"Classical Mind",credits:3,semester:"Year 1 Fall",prerequisites:[],isPassed:false},
  {code:"ENG 101",name:"Rhetoric and Composition",credits:3,semester:"Year 1 Fall",prerequisites:[],isPassed:false},
  {code:"MATH 122",name:"Calculus II",credits:4,semester:"Year 1 Spring",prerequisites:["MATH 121"],isPassed:false},
  {code:"CSC 210",name:"Discrete Mathematics",credits:3,semester:"Year 1 Spring",prerequisites:["CSC 123"],isPassed:false},
  {code:"CSC 223",name:"Object Oriented Programming",credits:3,semester:"Year 1 Spring",prerequisites:["CSC 123"],isPassed:false},
  {code:"PHIL 202",name:"Modern Mind",credits:3,semester:"Year 1 Spring",prerequisites:["PHIL 201"],isPassed:false},
  {code:"TRS 201",name:"Faith Seeking Understanding",credits:3,semester:"Year 1 Spring",prerequisites:[],isPassed:false},
  {code:"CSC 212",name:"Theory of Computing",credits:3,semester:"Year 2 Fall",prerequisites:["CSC 210"],isPassed:false},
  {code:"CSC 280",name:"Data Structures",credits:3,semester:"Year 2 Fall",prerequisites:["CSC 223"],isPassed:false},
  {code:"CSC 370",name:"Concepts of Programming Languages",credits:3,semester:"Year 2 Fall",prerequisites:["CSC 223"],isPassed:false},
  {code:"TRS 202",name:"The Church and the Human Person",credits:3,semester:"Year 2 Fall",prerequisites:["TRS 201"],isPassed:false},
  {code:"CSC 323",name:"Intro to Computer Networks",credits:3,semester:"Year 2 Spring",prerequisites:["CSC 280"],isPassed:false},
  {code:"CSC 326",name:"Switching Circuits & Logic Design",credits:3,semester:"Year 2 Spring",prerequisites:["CSC 212"],isPassed:false},
  {code:"CSC 327",name:"Switching Circuits Lab",credits:1,semester:"Year 2 Spring",prerequisites:["CSC 326"],isPassed:false},
  {code:"CSC 322",name:"Intro to Computer Graphics",credits:3,semester:"Year 2 Spring",prerequisites:["CSC 280"],isPassed:false},
  {code:"MATH 309",name:"Probability and Statistics",credits:3,semester:"Year 3 Fall",prerequisites:["MATH 122"],isPassed:false},
  {code:"CSC 363",name:"Software Engineering",credits:3,semester:"Year 3 Fall",prerequisites:["CSC 280"],isPassed:false},
  {code:"CSC 390",name:"Computer Organization & Architecture",credits:3,semester:"Year 3 Fall",prerequisites:["CSC 326"],isPassed:false},
  {code:"CSC 442",name:"Intro to Database Systems",credits:3,semester:"Year 3 Fall",prerequisites:["CSC 280"],isPassed:false},
  {code:"PHIL 362",name:"Professional Ethics in Engineering",credits:3,semester:"Year 3 Fall",prerequisites:["PHIL 202"],isPassed:false},
  {code:"CSC 306",name:"Intro to Operating Systems",credits:3,semester:"Year 3 Spring",prerequisites:["CSC 390"],isPassed:false},
  {code:"CSC 409",name:"Web Design & Programming",credits:3,semester:"Year 3 Spring",prerequisites:["CSC 323"],isPassed:false},
  {code:"CSC 491A",name:"Senior Design I",credits:3,semester:"Year 4 Fall",prerequisites:["CSC 363"],isPassed:false},
  {code:"CSC 411",name:"Analysis of Algorithms",credits:3,semester:"Year 4 Fall",prerequisites:["CSC 212","CSC 280"],isPassed:false},
  {code:"CSC 406",name:"Intro to Secure Computing",credits:3,semester:"Year 4 Spring",prerequisites:["CSC 306"],isPassed:false},
  {code:"CSC 491B",name:"Senior Design II",credits:3,semester:"Year 4 Spring",prerequisites:["CSC 441"],isPassed:false},
];

const SEMESTERS = ["Year 1 Fall","Year 1 Spring","Year 2 Fall","Year 2 Spring","Year 3 Fall","Year 3 Spring","Year 4 Fall","Year 4 Spring"];
let activeSem = SEMESTERS[0];
const courseMap = {};
COURSES.forEach(c => courseMap[c.code] = c);

function markPrereqsPassed(code){
  const c = courseMap[code];
  if(!c) return;
  c.isPassed = true;
  c.prerequisites.forEach(p => markPrereqsPassed(p));
}

function prereqsMet(course){
  return course.prerequisites.every(p => courseMap[p] && courseMap[p].isPassed);
}

function renderTabs(){
  const el = document.getElementById('tabs');
  el.innerHTML = SEMESTERS.map(s =>
    `<button class="tab${s===activeSem?' active':''}" onclick="selectSem('${s}')">${s}</button>`
  ).join('');
}

function renderGrid(){
  document.getElementById('sem-label').textContent = activeSem;
  const sem = COURSES.filter(c => c.semester === activeSem);
  document.getElementById('grid').innerHTML = sem.map(c => {
    const met = prereqsMet(c);
    let cls = 'course-card';
    let dot = 'status-open';
    if(c.isPassed){ cls+=' passed'; dot='status-passed'; }
    else if(!met){ cls+=' ineligible'; dot='status-locked'; }
    return `<div class="${cls}" onclick="openModal('${c.code}')">
      <div class="card-status ${dot}"></div>
      <div>
        <div class="card-code">${c.code}</div>
        <div class="card-name">${c.name}</div>
      </div>
      <div class="card-credits">${c.credits} cr</div>
    </div>`;
  }).join('');
  renderProgress();
}

function renderProgress(){
  const total = COURSES.length;
  const passed = COURSES.filter(c=>c.isPassed).length;
  const pct = Math.round(passed/total*100);
  document.getElementById('prog-fill').style.width = pct+'%';
  document.getElementById('prog-label').textContent = `${passed} of ${total} courses passed (${pct}%)`;
}

function selectSem(s){ activeSem=s; renderTabs(); renderGrid(); }

function openModal(code){
  const course = courseMap[code];
  const bg = document.getElementById('modal-bg');
  const modal = document.getElementById('modal');
  const met = prereqsMet(course);

  let prereqHTML = '';
  if(course.prerequisites.length === 0){
    prereqHTML = `<div style="font-size:12px;color:var(--color-text-secondary);margin-bottom:1rem">No prerequisites required.</div>`;
  } else {
    prereqHTML = `<div style="margin-bottom:1rem">` +
      course.prerequisites.map(p => {
        const pr = courseMap[p];
        if(!pr) return '';
        if(pr.isPassed){
          return `<div class="prereq-row">
            <div class="prereq-info"><div class="prereq-code">${pr.code}</div><div class="prereq-name">${pr.name}</div></div>
            <span class="btn-passed-badge">passed</span>
          </div>`;
        }
        return `<div class="prereq-row" id="pr-${p.replace(' ','-')}">
          <div class="prereq-info"><div class="prereq-code">${pr.code}</div><div class="prereq-name">${pr.name}</div></div>
          <div style="display:flex;gap:5px">
            <button class="btn-yes" onclick="confirmPrereq('${p}','${code}')">yes</button>
            <button class="btn-no" onclick="denyPrereq('${p}','${code}')">no</button>
          </div>
        </div>`;
      }).join('') + `</div>`;
  }

  const resultBanner = met
    ? `<div class="result-banner result-eligible">✓ You are eligible to enroll in ${course.code}</div>`
    : (course.isPassed ? `<div class="result-banner result-eligible">✓ Already passed</div>`
    : `<div class="result-banner result-ineligible" id="elig-banner">Complete prerequisite checks above</div>`);

  modal.innerHTML = `
    <h2>${course.code}</h2>
    <div class="subtitle">${course.name} &middot; ${course.credits} credits &middot; ${course.semester}</div>
    <div id="result-wrap">${resultBanner}</div>
    ${prereqHTML}
    <div class="modal-actions">
      ${!course.isPassed ? `<button class="btn-primary" onclick="markPassed('${code}')">Mark as passed</button>` : ''}
      <button class="btn-secondary" onclick="closeModal()">close</button>
    </div>`;

  bg.style.display='flex';
}

function confirmPrereq(prereqCode, courseCode){
  markPrereqsPassed(prereqCode);
  renderGrid();
  openModal(courseCode);
}

function denyPrereq(prereqCode, courseCode){
  const row = document.getElementById('pr-'+prereqCode.replace(' ','-'));
  if(row) row.style.opacity='.4';
  const banner = document.getElementById('elig-banner');
  if(banner){ banner.textContent=`✗ Not eligible — ${prereqCode} not passed`; }
}

function markPassed(code){
  markPrereqsPassed(code);
  renderGrid();
  closeModal();
}

function closeModal(){
  document.getElementById('modal-bg').style.display='none';
}

document.getElementById('modal-bg').addEventListener('click', function(e){
  if(e.target === this) closeModal();
});

renderTabs();
renderGrid();
</script>
